name: "Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies & PyInstaller
        shell: bash
        run: |
          pip install -r src-python/requirements.txt
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            pip uninstall -y onnxruntime
            pip install onnxruntime-gpu nvidia-cuda-runtime-cu12 nvidia-cublas-cu12 nvidia-cufft-cu12 nvidia-cudnn-cu12
          fi
          pip install pyinstaller
          python - <<'PY'
          import onnxruntime as ort
          print("ONNX Runtime providers:", ort.get_available_providers())
          PY

      - name: Build Python Sidecar Binary
        shell: bash
        run: |
          rm -rf src-python/models
          mkdir -p src-tauri/binaries
          PYINSTALLER_ARGS=(
            --clean
            -y
            --onefile
            --distpath src-tauri/binaries
            --collect-all onnxruntime
            --collect-all tokenizers
            --collect-all scipy
            --collect-data huggingface_hub
            --collect-all hf_xet
            --hidden-import scipy.signal
          )
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            while IFS= read -r dll; do
              dll="${dll//$'\r'/}"
              if [ -z "$dll" ]; then
                continue
              fi
              PYINSTALLER_ARGS+=(--add-binary "$dll;onnxruntime/capi")
            done < <(python - <<'PY'
          import site
          from pathlib import Path

          # Bundle the CUDA/cuDNN runtime DLLs required by onnxruntime-gpu so
          # CUDA works on end-user machines without installing the CUDA Toolkit.
          required_dlls = {
              "cudart64_12.dll",
              "cublas64_12.dll",
              "cublasLt64_12.dll",
              "cufft64_11.dll",
              "cudnn64_9.dll",
              "cudnn_ops64_9.dll",
              "cudnn_cnn64_9.dll",
              "cudnn_graph64_9.dll",
              "cudnn_heuristic64_9.dll",
              "cudnn_engines_runtime_compiled64_9.dll",
              "cudnn_ext64_9.dll",
              "cudnn_engines_tensor_ir64_9.dll",
          }
          roots = [
              Path(base) / package / "bin"
              for base in site.getsitepackages()
              for package in (
                  "nvidia/cuda_runtime",
                  "nvidia/cublas",
                  "nvidia/cufft",
                  "nvidia/cudnn",
              )
          ]
          found = set()
          for root in roots:
              if root.is_dir():
                  for dll in sorted(root.glob("*.dll")):
                      if dll.name in required_dlls:
                          found.add(dll.name)
                          print(dll)

          missing = sorted(required_dlls - found)
          if missing:
              raise SystemExit(f"Missing required CUDA/cuDNN DLLs: {missing}")
          PY
            )
            pyinstaller "${PYINSTALLER_ARGS[@]}" --name sidecar-x86_64-pc-windows-msvc src-python/sidecar.py
          else
            pyinstaller "${PYINSTALLER_ARGS[@]}" --name sidecar-aarch64-apple-darwin src-python/sidecar.py
          fi
          du -sh src-tauri/binaries 2>/dev/null || true

      - name: Assert model files are not bundled
        shell: bash
        run: |
          if find src-python -path 'src-python/models/*' -type f | grep -q .; then
            echo "::error::src-python/models must not exist in release builds; models are downloaded from Hugging Face on first load."
            find src-python/models -maxdepth 2 -type f -print
            exit 1
          fi

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: Configure macOS signing
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required=(
            SECRET_APPLE_CERTIFICATE
            SECRET_APPLE_CERTIFICATE_PASSWORD
            SECRET_APPLE_SIGNING_IDENTITY
            SECRET_APPLE_ID
            SECRET_APPLE_PASSWORD
            SECRET_APPLE_TEAM_ID
          )

          configured=0
          missing=()
          for key in "${required[@]}"; do
            if [ -n "${!key:-}" ]; then
              configured=1
            else
              missing+=("$key")
            fi
          done

          if [ "$configured" -eq 1 ] && [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Incomplete macOS signing/notarization secrets. Missing: ${missing[*]}"
            echo "::error::Set all required Apple secrets, or remove the partial Apple secrets to use ad-hoc signing for draft/internal builds."
            exit 1
          fi

          if [ "$configured" -eq 0 ]; then
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "::warning::No Apple Developer ID signing/notarization secrets configured. Using ad-hoc signing for macOS. This avoids unsigned Apple Silicon bundles, but public distribution should use Developer ID signing and notarization."
          else
            {
              echo "APPLE_CERTIFICATE=$SECRET_APPLE_CERTIFICATE"
              echo "APPLE_CERTIFICATE_PASSWORD=$SECRET_APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$SECRET_APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$SECRET_APPLE_ID"
              echo "APPLE_PASSWORD=$SECRET_APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$SECRET_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "Using Apple Developer ID signing and notarization for macOS."
          fi

      - name: Build and release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Voice Clone v__VERSION__"
          releaseBody: "Bản phát hành tự động cho Voice Clone. App downloads OmniVoice model files from Hugging Face on first load and caches them locally instead of bundling model files in the installer. Windows build bundles ONNX Runtime GPU plus CUDA/cuDNN runtime DLLs so CUDA can be selected on supported NVIDIA systems. macOS public distribution requires Apple Developer ID signing and notarization; otherwise the draft build is ad-hoc signed for internal testing."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
