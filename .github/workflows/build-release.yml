name: "Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - name: Assert runtime assets are not bundled
        shell: bash
        run: |
          if find src-tauri/binaries -type f 2>/dev/null | grep -q .; then
            echo "::error::src-tauri/binaries must not contain bundled sidecar/runtime files."
            find src-tauri/binaries -type f -print
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          bundle = config.get("bundle", {})
          if bundle.get("externalBin"):
              raise SystemExit("Tauri externalBin must stay empty; runtime installs on first launch.")

          resources = bundle.get("resources", {})
          sources = resources.keys() if isinstance(resources, dict) else resources
          forbidden = []
          for source in sources:
              normalized = str(source).replace("\\", "/").rstrip("/")
              if normalized.endswith("src-python") or "src-python/models" in normalized:
                  forbidden.append(source)
          if forbidden:
              raise SystemExit(
                  "Tauri resources must not bundle OmniVoice model directories: "
                  + ", ".join(map(str, forbidden))
              )
          print("No bundled sidecar/runtime/model directories are configured.")
          PY

      - name: Configure macOS signing
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          SECRET_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SECRET_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SECRET_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          required=(
            SECRET_APPLE_CERTIFICATE
            SECRET_APPLE_CERTIFICATE_PASSWORD
            SECRET_APPLE_SIGNING_IDENTITY
            SECRET_APPLE_ID
            SECRET_APPLE_PASSWORD
            SECRET_APPLE_TEAM_ID
          )

          configured=0
          missing=()
          for key in "${required[@]}"; do
            if [ -n "${!key:-}" ]; then
              configured=1
            else
              missing+=("$key")
            fi
          done

          if [ "$configured" -eq 1 ] && [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Incomplete macOS signing/notarization secrets. Missing: ${missing[*]}"
            exit 1
          fi

          if [ "$configured" -eq 0 ]; then
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            echo "::warning::No Apple Developer ID signing/notarization secrets configured. Using ad-hoc signing for macOS."
          else
            {
              echo "APPLE_CERTIFICATE=$SECRET_APPLE_CERTIFICATE"
              echo "APPLE_CERTIFICATE_PASSWORD=$SECRET_APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$SECRET_APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$SECRET_APPLE_ID"
              echo "APPLE_PASSWORD=$SECRET_APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$SECRET_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Voice Clone v__VERSION__"
          releaseBody: "Voice Clone installs Python, FFmpeg, PyTorch, and model cache automatically on first launch into ~/.voiceclone. Installers no longer bundle the PyInstaller sidecar or model weights."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
