name: "Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: "--bundles msi"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies & PyInstaller
        run: |
          pip install -r src-python/requirements.txt
          pip install pyinstaller

      - name: Download models from Hugging Face
        run: python src-python/download_models.py

      - name: Build Python Sidecar Binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            pyinstaller --clean -y --onefile --distpath src-tauri/binaries --name sidecar-x86_64-pc-windows-msvc src-python/sidecar.py
          else
            pyinstaller --clean -y --onefile --distpath src-tauri/binaries --name sidecar-aarch64-apple-darwin src-python/sidecar.py
          fi

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: Build and release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Voice Clone v__VERSION__"
          releaseBody: "Bản phát hành tự động cho Voice Clone."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
