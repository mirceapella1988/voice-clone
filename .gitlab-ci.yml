workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

stages:
  - build
  - release

variables:
  GIT_DEPTH: "0"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  LINUX_RUNNER_TAG: "saas-linux-medium-amd64"
  MACOS_RUNNER_TAG: "saas-macos-medium-m1"
  WINDOWS_RUNNER_TAG: "shared-windows"

.build_rules:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'

macos_build:
  stage: build
  extends: .build_rules
  tags:
    - $MACOS_RUNNER_TAG
  script:
    - |
      set -euo pipefail
      rm -rf src-python/models

      if ! command -v node >/dev/null 2>&1; then
        brew install node
      fi
      if ! command -v python3 >/dev/null 2>&1; then
        brew install python
      fi
      if ! command -v cargo >/dev/null 2>&1; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        . "$HOME/.cargo/env"
      fi

      rustup target add aarch64-apple-darwin
      bash build-local.sh
  artifacts:
    name: "voice-clone-macos-$CI_COMMIT_REF_SLUG"
    expire_in: 30 days
    when: always
    paths:
      - src-tauri/binaries/sidecar-aarch64-apple-darwin
      - src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
      - src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

windows_build:
  stage: build
  extends: .build_rules
  tags:
    - $WINDOWS_RUNNER_TAG
  script:
    - |
      $ErrorActionPreference = "Stop"

      if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
        throw "Chocolatey is required on the Windows runner. Use GitLab shared-windows or install Chocolatey on a self-hosted runner."
      }

      if (-not (Get-Command python -ErrorAction SilentlyContinue)) {
        choco install -y python --no-progress
      }
      if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
        choco install -y nodejs-lts --no-progress
      }
      if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
        choco install -y rustup.install --no-progress
      }

      if ($env:ChocolateyInstall -and (Test-Path "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1")) {
        Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
        refreshenv
      }

      if (Test-Path "src-python/models") {
        Remove-Item -Recurse -Force "src-python/models"
      }

      rustup target add x86_64-pc-windows-msvc
      powershell -ExecutionPolicy Bypass -File build-local.ps1
  artifacts:
    name: "voice-clone-windows-$CI_COMMIT_REF_SLUG"
    expire_in: 30 days
    when: always
    paths:
      - src-tauri/target/release/VoiceClone-Portable.zip
      - src-tauri/target/release/VoiceClone-Portable-Light.zip
      - src-tauri/target/release/VoiceClone-Sidecar-Windows.zip

gitlab_release:
  stage: release
  image: alpine:3.20
  tags:
    - $LINUX_RUNNER_TAG
  needs:
    - job: macos_build
      artifacts: true
    - job: windows_build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      set -euo pipefail
      apk add --no-cache bash curl jq

      version="${CI_COMMIT_TAG#v}"
      package_name="voice-clone"
      files_list="$(mktemp)"
      find src-tauri/target -type f \( -name "*.dmg" -o -name "*.zip" \) 2>/dev/null | sort -u > "$files_list"

      if [ ! -s "$files_list" ]; then
        echo "No release installers found in build artifacts."
        exit 1
      fi

      release_payload="$(jq -n \
        --arg name "Voice Clone ${CI_COMMIT_TAG}" \
        --arg tag_name "$CI_COMMIT_TAG" \
        --arg description "Manual GitLab release for Voice Clone ${CI_COMMIT_TAG}. Installers do not bundle OmniVoice models; users download k2-fsa/OmniVoice on first model load." \
        '{name: $name, tag_name: $tag_name, description: $description}')"

      curl --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$release_payload" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" \
      || curl --fail --request PUT \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$release_payload" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}"

      while IFS= read -r file; do
        name="$(basename "$file")"
        encoded_name="$(printf '%s' "$name" | jq -sRr @uri)"
        upload_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${package_name}/${version}/${encoded_name}"

        curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$file" "$upload_url"

        link_payload="$(jq -n \
          --arg name "$name" \
          --arg url "$upload_url" \
          '{name: $name, url: $url, link_type: "package"}')"

        curl --fail --request POST \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "$link_payload" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links" \
        || true
      done < "$files_list"
